version: "3.9"
services:
  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/support_db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SIMILARITY_THRESHOLD=0.35
    volumes:
      - .:/app
      - ./kb_uploads:/app/kb_uploads
      - ./chroma_db:/app/chroma_db

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=support_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_support:/var/lib/postgresql/data

volumes:
  pgdata_support:
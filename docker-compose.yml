services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on: []
    environment:
    - NODE_ENV=development
    - CHOKIDAR_USEPOLLING=true
    - WATCHPACK_POLLING=true
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 10s
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3000 || exit 1
      timeout: 10s
    ports:
    - ${FRONTEND_PORT:-3000}:3000
    volumes:
    - ./frontend:/app
    - /app/node_modules
version: '3.8'
